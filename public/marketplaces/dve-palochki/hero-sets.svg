<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Hero placeholder: combo sets theme -->
  <defs>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e8ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad2)"/>
  <!-- Combo boxes illustration -->
  <g transform="translate(600, 280)">
    <!-- Box 1 -->
    <rect x="-140" y="-80" width="100" height="100" rx="8" fill="#FDB913" stroke="#E32636" stroke-width="3"/>
    <text x="-90" y="-20" font-size="28" font-weight="700" fill="#E32636" text-anchor="middle">SET</text>
    <text x="-90" y="10" font-size="16" fill="#1a1a1a" text-anchor="middle">2 на 1</text>
    <!-- Box 2 -->
    <rect x="-20" y="-100" width="120" height="120" rx="8" fill="#E32636" stroke="#FDB913" stroke-width="3"/>
    <text x="40" y="-30" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">BEST</text>
    <text x="40" y="5" font-size="16" fill="#fff" text-anchor="middle">Популярный</text>
    <!-- Box 3 -->
    <rect x="120" y="-75" width="100" height="100" rx="8" fill="#4CAF50" stroke="#E32636" stroke-width="3"/>
    <text x="170" y="-15" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">PRO</text>
    <text x="170" y="15" font-size="14" fill="#fff" text-anchor="middle">Набор</text>
  </g>
  <!-- Text overlay -->
  <text x="600" y="500" font-family="system-ui" font-size="48" font-weight="700" fill="#1a1a1a" text-anchor="middle">Выгодные комбо</text>
  <text x="600" y="550" font-family="system-ui" font-size="24" fill="#666" text-anchor="middle">Экономьте на наборах</text>
</svg>
