<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Hero placeholder: sushi theme -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe8e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  <!-- Sushi rolls illustration -->
  <g transform="translate(600, 300)">
    <!-- Sushi roll 1 -->
    <ellipse cx="-100" cy="-80" rx="60" ry="50" fill="#F5A962"/>
    <ellipse cx="-100" cy="-80" rx="50" ry="40" fill="#FDB913"/>
    <circle cx="-120" cy="-90" r="12" fill="#fff" opacity="0.6"/>
    <!-- Sushi roll 2 -->
    <ellipse cx="0" cy="-100" rx="70" ry="55" fill="#E32636"/>
    <ellipse cx="0" cy="-100" rx="60" ry="45" fill="#FF6B6B"/>
    <circle cx="-10" cy="-110" r="14" fill="#fff" opacity="0.6"/>
    <!-- Sushi roll 3 -->
    <ellipse cx="100" cy="-75" rx="65" ry="50" fill="#4CAF50"/>
    <ellipse cx="100" cy="-75" rx="55" ry="40" fill="#66BB6A"/>
    <circle cx="85" cy="-90" r="13" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Text overlay -->
  <text x="600" y="520" font-family="system-ui" font-size="48" font-weight="700" fill="#1a1a1a" text-anchor="middle">Суши и роллы</text>
  <text x="600" y="570" font-family="system-ui" font-size="24" fill="#666" text-anchor="middle">Доставим за 60–90 минут</text>
</svg>
