<svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Two chopsticks with red accent -->
  <g>
    <!-- Left chopstick -->
    <line x1="20" y1="8" x2="28" y2="32" stroke="#E32636" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right chopstick -->
    <line x1="32" y1="8" x2="24" y2="32" stroke="#E32636" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Accent dots -->
    <circle cx="22" cy="14" r="1.5" fill="#E32636"/>
    <circle cx="30" cy="26" r="1.5" fill="#E32636"/>
  </g>
  <!-- Text: "Две палочки" abbreviated as ДП or just use simple geometric design -->
  <text x="42" y="24" font-family="system-ui, -apple-system" font-size="16" font-weight="600" fill="#1a1a1a" letter-spacing="-0.5">ДП</text>
</svg>
